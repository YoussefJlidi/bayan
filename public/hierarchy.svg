<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="hbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="hline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#451a03;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <rect width="800" height="520" rx="12" fill="url(#hbg)"/>
  <rect width="800" height="520" rx="12" fill="none" stroke="#1e293b"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#94a3b8" letter-spacing="4">HIERARCHIE DES SOURCES</text>
  <rect x="250" y="52" width="300" height="1" fill="#1e293b"/>

  <!-- Vertical line -->
  <rect x="79" y="80" width="2" height="400" fill="url(#hline)" rx="1"/>

  <!-- Level 1 -->
  <circle cx="80" cy="105" r="14" fill="#0f172a" stroke="#d97706" stroke-width="2"/>
  <text x="80" y="110" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#f59e0b">1</text>
  <rect x="110" y="80" width="660" height="50" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="130" y="102" font-family="sans-serif" font-size="13" font-weight="bold" fill="#f59e0b">Quran bi'l-Quran</text>
  <text x="310" y="102" font-family="serif" font-size="15" fill="#92400e">تفسير القرآن بالقرآن</text>
  <text x="130" y="120" font-family="sans-serif" font-size="11" fill="#94a3b8">Le Coran est son propre meilleur interprete</text>

  <!-- Level 2 -->
  <circle cx="80" cy="185" r="14" fill="#0f172a" stroke="#b45309" stroke-width="2"/>
  <text x="80" y="190" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#d97706">2</text>
  <rect x="110" y="160" width="660" height="50" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="130" y="182" font-family="sans-serif" font-size="13" font-weight="bold" fill="#d97706">Bi'l-Hadith</text>
  <text x="260" y="182" font-family="serif" font-size="15" fill="#92400e">تفسير بالحديث</text>
  <text x="130" y="200" font-family="sans-serif" font-size="11" fill="#94a3b8">Le Prophete est l'interprete autorise (16:44)</text>

  <!-- Level 3 -->
  <circle cx="80" cy="265" r="14" fill="#0f172a" stroke="#92400e" stroke-width="2"/>
  <text x="80" y="270" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#b45309">3</text>
  <rect x="110" y="240" width="660" height="50" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="130" y="262" font-family="sans-serif" font-size="13" font-weight="bold" fill="#b45309">Bi'l-Athar</text>
  <text x="250" y="262" font-family="serif" font-size="15" fill="#78350f">تفسير بالأثر</text>
  <text x="130" y="280" font-family="sans-serif" font-size="11" fill="#94a3b8">Ibn 'Abbas, Ibn Mas'ud, Mujahid, Qatada...</text>

  <!-- Level 4 -->
  <circle cx="80" cy="345" r="14" fill="#0f172a" stroke="#78350f" stroke-width="2"/>
  <text x="80" y="350" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#92400e">4</text>
  <rect x="110" y="320" width="660" height="50" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="130" y="342" font-family="sans-serif" font-size="13" font-weight="bold" fill="#92400e">Bi'l-Lugha</text>
  <text x="252" y="342" font-family="serif" font-size="15" fill="#78350f">تفسير باللغة</text>
  <text x="130" y="360" font-family="sans-serif" font-size="11" fill="#94a3b8">Sarf, nahw, balagha, gharib al-Quran</text>

  <!-- Level 5 -->
  <circle cx="80" cy="425" r="14" fill="#0f172a" stroke="#475569" stroke-width="2"/>
  <text x="80" y="430" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#64748b">5</text>
  <rect x="110" y="400" width="660" height="50" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="130" y="422" font-family="sans-serif" font-size="13" font-weight="bold" fill="#64748b">Bi'l-Ra'y</text>
  <text x="240" y="422" font-family="serif" font-size="15" fill="#475569">تفسير بالرأي</text>
  <text x="130" y="440" font-family="sans-serif" font-size="11" fill="#94a3b8">Mahmud (fonde) vs Madhmum (sans base savante)</text>

  <!-- Bottom note -->
  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">Un niveau inferieur ne peut jamais contredire un niveau superieur.</text>
</svg>
