<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b45309"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="goldFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#d97706;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0"/>
    </linearGradient>
    <pattern id="pattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M20 0v40M0 20h40" stroke="#d97706" stroke-opacity="0.04" stroke-width="0.5" fill="none"/>
      <circle cx="20" cy="20" r="1" fill="#d97706" fill-opacity="0.06"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#pattern)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="200" r="180" fill="none" stroke="#d97706" stroke-opacity="0.03" stroke-width="0.5"/>
  <circle cx="1100" cy="200" r="180" fill="none" stroke="#d97706" stroke-opacity="0.03" stroke-width="0.5"/>
  <circle cx="600" cy="200" r="280" fill="none" stroke="#d97706" stroke-opacity="0.02" stroke-width="0.5"/>

  <!-- Top line -->
  <rect x="350" y="80" width="500" height="1" fill="url(#goldFade)"/>

  <!-- Arabic title -->
  <text x="600" y="185" text-anchor="middle" font-family="serif" font-size="90" fill="url(#gold)" filter="url(#glow)">بَيَان</text>

  <!-- Subtitle -->
  <text x="600" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#94a3b8" letter-spacing="6">MOTEUR D'EXEGESE CORANIQUE</text>

  <!-- Bottom line -->
  <rect x="350" y="270" width="500" height="1" fill="url(#goldFade)"/>

  <!-- Stats -->
  <text x="310" y="330" text-anchor="middle" font-family="monospace" font-size="13" fill="#d97706">9 SOURCES</text>
  <text x="490" y="330" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">5 NIVEAUX</text>
  <text x="690" y="330" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">3 SCIENCES</text>
  <text x="890" y="330" text-anchor="middle" font-family="monospace" font-size="13" fill="#d97706">8 ETAPES</text>

  <!-- Dots between stats -->
  <circle cx="400" cy="327" r="2" fill="#334155"/>
  <circle cx="590" cy="327" r="2" fill="#334155"/>
  <circle cx="790" cy="327" r="2" fill="#334155"/>
</svg>
